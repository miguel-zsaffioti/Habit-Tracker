name: CI - Testes e Análise SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Testes e cobertura do Backend (Python)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend - pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: "123"
          POSTGRES_DB: banco_central
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt pytest pytest-cov

      - name: Rodar testes com cobertura
        env:
          DATABASE_URL: postgresql://admin:123@localhost:5433/banco_central
        run: |
          cd backend
          pytest tests/ --cov=. --cov-report=xml:../coverage-backend.xml -v

      - name: Salvar relatório de cobertura do backend
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage-backend.xml

  # ─────────────────────────────────────────
  # 2. Testes e cobertura do Frontend Web (React + Vite)
  # ─────────────────────────────────────────
  frontend-tests:
    name: Frontend Web - Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-web/package-lock.json

      - name: Instalar dependências
        run: npm install --legacy-peer-deps
        working-directory: frontend-web

      - name: Rodar ESLint
        run: npm run lint
        working-directory: frontend-web

      - name: Rodar testes com cobertura
        run: npm run test:coverage
        working-directory: frontend-web

      - name: Build de verificação
        run: npm run build
        working-directory: frontend-web

      - name: Salvar relatório de cobertura do frontend
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend-web/coverage/lcov.info

  # ─────────────────────────────────────────
  # 3. Testes e cobertura do Mobile (Jest + React Native)
  # ─────────────────────────────────────────
  mobile-tests:
    name: Mobile - Jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
        working-directory: mobile-app

      - name: Rodar testes com cobertura
        run: npm test -- --coverage --coverageReporters=lcov --forceExit
        working-directory: mobile-app

      - name: Salvar relatório de cobertura do mobile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mobile
          path: mobile-app/coverage/lcov.info

  # ─────────────────────────────────────────
  # 4. Análise SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, mobile-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar cobertura do backend
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend

      - name: Baixar cobertura do frontend
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend-web/coverage

      - name: Baixar cobertura do mobile
        uses: actions/download-artifact@v4
        with:
          name: coverage-mobile
          path: mobile-app/coverage

      - name: Análise SonarCloud
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}