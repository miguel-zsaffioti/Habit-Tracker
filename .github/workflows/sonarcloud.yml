name: Testes e Análise SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend - pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: "123"
          POSTGRES_DB: banco_central
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt pytest pytest-cov

      - name: Rodar testes com cobertura
        env:
          DATABASE_URL: postgresql://admin:123@localhost:5433/banco_central
        run: |
          cd backend
          pytest tests/ --cov=. --cov-report=xml:../coverage.xml -v

      - name: Salvar relatório de cobertura
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  frontend-lint:
    name: Frontend Web - ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-web/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: frontend-web

      - name: Rodar ESLint
        run: npm run lint
        working-directory: frontend-web

      - name: Build de verificação
        run: npm run build
        working-directory: frontend-web

  mobile-tests:
    name: Mobile - Jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: mobile-app

      - name: Rodar testes
        run: npm test -- --passWithNoTests --forceExit
        working-directory: mobile-app

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint, mobile-tests]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  

      - name: Baixar relatório de cobertura
        uses: actions/download-artifact@v3
        with:
          name: coverage-report

      - name: Análise SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
